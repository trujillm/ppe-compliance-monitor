name: Pre-commit Autofix

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/google/yamlfmt/cmd/yamlfmt@v0.9.0

      - uses: pre-commit/action@v3.0.1
        id: pre-commit
        continue-on-error: true
        with:
          extra_args: --all-files

      - if: steps.pre-commit.outcome == 'failure'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: auto-fix pre-commit issues"
          branch: pre-commit-autofix
          title: "style: auto-fix pre-commit issues"
          body: |
            Automated PR created by the **Pre-commit Autofix** workflow.

            This applies all fixes from `pre-commit run --all-files`.
          delete-branch: true
