backend:
  replicas: 1
  port: 8888
  corsOrigins: ""
  # Config storage: MinIO (config bucket) when enabled - enables horizontal scaling
  configStorage:
    enabled: true
  image:
    repository: quay.io/rh-ai-quickstart/ppe-compliance-monitor-backend
    tag: latest
    pullPolicy: Always
  # Example predictor URL; when runtimeDeployer + openvino.multiModel, use the multi-model ISVC (e.g. multi-model-serving-predictor).
  serviceUrl: "http://ppe-predictor.svc.cluster.local:8888"
  modelInputName: "x"
  modelVersion: "1"
  logLevel: "INFO"

openai:
  apiToken: ""
  apiEndpoint: ""
  model: ""
  temperature: "0.7"

frontend:
  replicas: 1
  port: 3000
  apiUrl: ""
  image:
    repository: quay.io/rh-ai-quickstart/ppe-compliance-monitor-frontend
    tag: latest
    pullPolicy: Always

minio:
  secret:
    user: minioadmin
    password: minioadmin
    host: minio
    port: "9000"

  # Auto-create buckets on deployment
  bucketCreation:
    enabled: true
    buckets:
      - models
      - data
      - config # User uploads and thumbnails (enables horizontal scaling)

  # Upload sample files to the minio bucket
  sampleFileUpload:
    enabled: false
    # bucket: models
    # urls:
    # - https://raw.githubusercontent.com/***

# Video stream (RTSP) - always streams. Default: in-cluster MP4 from MinIO via MediaMTX
# For real camera: set streamUrl (e.g. rtsp://user:pass@camera-ip:554/stream)
videoStream:
  # When empty: deploy in-cluster video-stream stack (MP4 from MinIO)
  # When set: use external stream (real camera), do not deploy video-stream
  streamUrl: ""
  image:
    repository: bluenviron/mediamtx
    tag: latest
    pullPolicy: IfNotPresent
  ffmpegImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  port: 8554
  path: live

# MinIO storage configuration for model and video files
storage:
  enabled: true
  # PVC size for storing downloaded model and video files
  size: 1Gi
  model:
    bucket: models
    key: ppe.pt
  video:
    bucket: data
    key: combined-video-no-gap-rooftop.mp4

# PostgreSQL database for tracking data persistence
postgresql:
  enabled: true
  host: "" # Defaults to {{ .Release.Name }}-ppe-compliance-monitor-postgresql
  port: "5432"
  database: "ppe_tracking"
  user: "ppe_user"
  password: "ppe_password"
  storage:
    size: 5Gi

labelStudio:
  enabled: true
  global:
    releaseName: ""
    chartName: ppe-compliance-monitor
  replicas: 1
  image:
    repository: docker.io/heartexlabs/label-studio
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  service:
    port: 8080
  route:
    enabled: true
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  app:
    host: ""
    csrfTrustedOrigins: ""
  storage:
    size: 5Gi
  database:
    host: "" # Defaults to <release>-<chartName>-postgresql
    port: "5432"
    name: "ppe_tracking"
    user: "ppe_user"
    password: "ppe_password"
  auth:
    existingSecretName: ""
    # Set your own long random key for production environments.
    secretKey: "ppe-compliance-monitor-labelstudio-secret"

# Postgres MCP server (read-only SSE access for the LLM agent)
postgresMcp:
  enabled: true
  image:
    repository: docker.io/crystaldba/postgres-mcp
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  accessMode: "restricted"

eval:
  enabled: true
  image:
    repository: quay.io/rh-ai-quickstart/ppe-compliance-monitor-evals
    tag: latest
    pullPolicy: Always

data:
  image:
    repository: quay.io/rh-ai-quickstart/ppe-compliance-monitor-data
    tag: latest
    pullPolicy: Always

runtimeDeployer:
  enabled: true
  # Default OVMS model id for cluster bootstrap (backend uses app_config.model_name per config).
  modelName: "ppe"
  # Inference(SVC) metadata.name when modelServing.openvino.multiModel or kserve.multiModel is true.
  inferenceServiceName: "multi-model-serving"
  image:
    repository: quay.io/rh-ai-quickstart/ppe-compliance-monitor-runtime
    tag: latest
    pullPolicy: Always
  scc:
    enabled: false

modelServing:
  enabled: true
  name: "" # Defaults to Release.Namespace + "-deploy"
  # Runtime type: "openvino" (OVMS, current default) or "kserve" (V2/OIP REST with ONNX)
  runtimeType: kserve
  deploymentMode: RawDeployment
  auth: false
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi
  # OpenVINO Model Server config (used when runtimeType=openvino)
  openvino:
    image: "registry.redhat.io/rhoai/odh-openvino-model-server-rhel9@sha256:7daebf4a4205b9b81293932a1dfec705f59a83de8097e468e875088996c1f224"
    restPort: 8888
    grpcPort: 9000
    modelFormat:
      name: pytorch
      version: "2"
    # Single model: ovms/<model_name> (matches Triton-style triton/<model_name>); logical OVMS name is still model_name (e.g. ppe).
    modelPath: ovms/ppe
    # Multi-model: sync prefix ovms/ (IR trees + ovms/config.json); OVMS --config_path=/mnt/models/config.json
    multiModel: false
    multiModelStoragePath: ovms
  # KServe-native runtime config (used when runtimeType=kserve)
  # NVIDIA Triton Inference Server -- GPU-accelerated ONNX serving via V2/OIP REST
  kserve:
    gpu:
      enabled: true
      count: "1"
      tolerations:
        - key: g5-gpu
          operator: Exists
          effect: NoSchedule
    image: "nvcr.io/nvidia/tritonserver:24.08-py3"
    restPort: 8000
    grpcPort: 9000
    command: []
    args: []
    env: {}
    modelFormat:
      name: onnx
      version: "1"
    # Single model: MinIO prefix must be triton/ (not triton/<stem>): KServe strips storage.path under /mnt/models, so
    # triton/ppe yielded .../1/model.onnx (invalid model name "1"); triton yields .../ppe/1/model.onnx. runtimeDeployer.modelName must match <stem> (e.g. ppe).
    modelPath: triton
    # Multi-model: same parent prefix triton/ (see multiModelStoragePath). Triton trees: triton/<stem>/1/model.onnx; --strict-model-config=false.
    multiModel: false
    multiModelStoragePath: triton
    modelInputName: images
    templateName: kserve-tritonserver
    templateDisplayName: "NVIDIA Triton Inference Server"

openshift:
  sharedHost: ""
  route:
    enabled: true
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  backendRoute:
    enabled: true
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  networkPolicy:
    enabled: true
  scc:
    enabled: false
    name: "itap-demo-scc"
  roleBinding:
    enabled: false
    serviceAccountName: default
