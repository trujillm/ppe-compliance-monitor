{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "label-studio.fullname" . }}
  labels:
    {{- include "label-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: labelstudio
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "label-studio.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: labelstudio
  template:
    metadata:
      labels:
        {{- include "label-studio.labels" . | nindent 8 }}
        app.kubernetes.io/component: labelstudio
    spec:
      containers:
        - name: labelstudio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: DJANGO_DB
              value: default
            - name: USE_X_FORWARDED_HOST
              value: "true"
            {{- if .Values.app.host }}
            - name: LABEL_STUDIO_HOST
              value: {{ .Values.app.host | quote }}
            {{- else if .Values.route.host }}
            - name: LABEL_STUDIO_HOST
              value: {{ printf "https://%s" .Values.route.host | quote }}
            {{- end }}
            {{- if .Values.app.csrfTrustedOrigins }}
            - name: CSRF_TRUSTED_ORIGINS
              value: {{ .Values.app.csrfTrustedOrigins | quote }}
            {{- else if .Values.route.host }}
            - name: CSRF_TRUSTED_ORIGINS
              value: {{ printf "https://%s" .Values.route.host | quote }}
            {{- end }}
            {{- if or .Values.auth.existingSecretName .Values.auth.secretKey }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecretName | default (printf "%s-auth" (include "label-studio.fullname" .)) | quote }}
                  key: SECRET_KEY
            {{- end }}
            - name: POSTGRE_HOST
              value: {{ .Values.database.host | default (printf "%s-%s-postgresql" .Release.Name (default "ppe-compliance-monitor" .Values.global.chartName)) | quote }}
            - name: POSTGRE_PORT
              value: {{ .Values.database.port | quote }}
            - name: POSTGRE_NAME
              value: {{ .Values.database.name | quote }}
            - name: POSTGRE_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRE_PASSWORD
              value: {{ .Values.database.password | quote }}
          volumeMounts:
            - name: labelstudio-data
              mountPath: /label-studio/data
      volumes:
        - name: labelstudio-data
          persistentVolumeClaim:
            claimName: {{ include "label-studio.fullname" . }}
{{- end }}
